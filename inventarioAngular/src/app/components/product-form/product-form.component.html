<div class="p-8 mt-4">
    <div class="shadow p-6">
        @if(isEdit){
            <h4>Actualizar Producto</h4>
        }@else{
            <h4>Crear Producto</h4>
        }
        <form [formGroup]="productForm" (ngSubmit)="save()">
            <div class="w-full flex flex-wrap">
                <mat-form-field class="w-full">
                    <mat-label>Nombre</mat-label>
                    <input type="text" matInput placeholder="Nombre" formControlName="nombre" />
                </mat-form-field>
            </div>
            <div class="w-full flex flex-wrap">
                <mat-form-field class="w-full">
                    <mat-label>Stock</mat-label>
                    <input type="number" matInput placeholder="Stock" formControlName="stock" />
                </mat-form-field>
            </div>
            <div class="w-full flex flex-wrap">
                <mat-form-field class="w-full">
                    <mat-label>Fecha de Creacion</mat-label>
                    <input type="datetime" matInput placeholder="Fecha de Creación" formControlName="fechaCreacion" />
                </mat-form-field>
            </div>
            <div class="flex justify-center">
                @if(isEdit){
                    <button mat-raised-button color="primary" [disabled]="!productForm.valid">Actualizar</button>
                }@else{
                    <button mat-raised-button color="primary" [disabled]="!productForm.valid">Guardar</button>
                }
                
            </div>
        </form>
    </div>
</div>
